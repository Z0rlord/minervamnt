[mint]
name = "Minerva Mint"
description = "Cashu mint backed by Ark VTXOs"
url = "https://mint.example.com"

[ark]
backend = "mock"
server_url = "https://asp.example.com"
server_pubkey = "02placeholderpubkey0000000000000000000000000000000000000000000000000000"
barkd_url = "http://127.0.0.1:3535"
# exit_claim_address = "tb1..."
auto_claim_exits = false
refresh_threshold_blocks = 144
default_vtxo_expiry = 25920

[bitcoin]
# Override with BITCOIN_RPC_URL / BITCOIN_RPC_USER / BITCOIN_RPC_PASSWORD env
rpc_url = "http://127.0.0.1:8332"

[liquidity]
min_vtxo_reserve_msat = 1_000_000_000
max_single_vtxo_msat = 10_000_000_000
auto_board_threshold = 0.5

[database]
path = "data/minerva.sqlite"

[server]
host = "0.0.0.0"
port = 3338

[scheduler]
refresh_interval_secs = 60

[melt]
# inherit | mock | barkd — inherit follows ark.backend
backend = "inherit"

[signatory]
backend = "mock"
# remote: cdk-signatory gRPC (production)
# url = "http://127.0.0.1:3340"
# local: dev-only dhke (SIGNATORY_MINT_SECRET hex)

[trust]
# VTXO verification at boarding: "scaffold" (dev/mock ASP) or "vpack" (production).
vtxo_verify_mode = "scaffold"
# Reject blind signing when SignatoryPolicy checks fail.
signatory_policy_enforced = true
# Optional per-mint cap (sat); unset = no limit.
# max_mint_sat = 500000
# Run daily PoL epoch closure worker.
pol_enabled = true

[trust.ots]
enabled = true
calendar_urls = [
  "https://a.pool.opentimestamps.org",
  "https://b.pool.opentimestamps.org",
]
upgrade_interval_secs = 3600
